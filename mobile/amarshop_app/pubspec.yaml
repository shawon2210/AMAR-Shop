name: amarshop_app
description: AmarShop - Bangladesh's Premium Online Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.15
  firebase_auth: ^4.17.4
  google_sign_in: ^6.1.6
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.2.2
  uni_links: ^0.5.1
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  connectivity_plus: ^5.0.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^4.2.1
  photo_view: ^0.15.0
  image_picker: ^1.0.7
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1
  flutter_widget_from_html: ^0.14.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
