global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'amarshop-api'
    static_configs:
      - targets: ['backend:4000']
  - job_name: 'amarshop-frontend'
    static_configs:
      - targets: ['frontend:3000']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
