apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: amarshop-us-east
  labels:
    app: backend
    region: us-east-1
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend
      region: us-east-1
  template:
    metadata:
      labels:
        app: backend
        region: us-east-1
    spec:
      containers:
        - name: backend
          image: amarshop/backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: REGION
              value: "us-east-1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: region-secrets
                  key: DATABASE_URL_US_EAST
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - backend
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: amarshop-us-east
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
