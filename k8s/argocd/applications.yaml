apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amarshop-frontend
  namespace: argocd
spec:
  project: amarshop
  source:
    repoURL: 'https://github.com/amarshop/infrastructure.git'
    path: k8s/
    targetRevision: main
    helm:
      valueFiles:
        - values-frontend.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: amarshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
---
