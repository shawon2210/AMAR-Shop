apiVersion: v1
kind: ConfigMap
metadata:
  name: amarshop-config
  namespace: amarshop
data:
  NODE_ENV: "production"
  BASE_URL: "https://amarshop.com"
  API_URL: "https://api.amarshop.com"
  CDN_URL: "https://cdn.amarshop.com"
  PORT: "3000"
  DATABASE_URL: "postgresql://amarshop:${DB_PASSWORD}@postgres-service:5432/amarshop"
  REDIS_URL: "redis://redis-service:6379"
  ELASTICSEARCH_URL: "http://elasticsearch-service:9200"
  KAFKA_BROKERS: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
  JWT_EXPIRES_IN: "7d"
  AFFILIATE_COMMISSION_RATE: "5.0"
  CORS_ORIGIN: "https://amarshop.com"
  LOG_LEVEL: "info"
  RATE_LIMIT_TTL: "60"
  RATE_LIMIT_MAX: "100"
  UPLOAD_MAX_SIZE: "10485760"
  REGION: "us-east-1"
